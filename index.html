<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typo - Modern Typing Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="ui-frame">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M10 8h.01"></path><path d="M14 8h.01"></path><path d="M7 12h.01"></path><path d="M11 12h.01"></path><path d="M15 12h.01"></path><path d="M17 12h.01"></path><path d="M10 16h.01"></path><path d="M14 16h.01"></path><rect width="20" height="16" x="2" y="4" rx="2"></rect></svg>
                <span class="logo-text">typo</span>
            </div>

            <div class="controls-wrapper">
                <div class="controls">
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="words">words</button>
                        <button class="mode-btn" data-mode="time">time</button>
                        <button class="mode-btn" data-mode="custom">custom</button>
                    </div>
                    
                    <div class="divider"></div>

                    <div class="settings-toggles">
                        <button class="toggle-btn" data-setting="punctuation">punctuation</button>
                        <button class="toggle-btn" data-setting="numbers">numbers</button>
                    </div>

                    <div class="divider"></div>

                    <div class="language-selector">
                        <button class="lang-btn active" data-lang="english">english</button>
                        <button class="lang-btn" data-lang="spanish">spanish</button>
                        <button class="lang-btn" data-lang="programming">programming</button>
                    </div>
                </div>

                <div class="utility-btns">
                    <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="M4.93 4.93l1.41 1.41"></path><path d="M17.66 17.66l1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="M6.34 17.66l-1.41 1.41"></path><path d="M19.07 4.93l-1.41 1.41"></path></svg>
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
                    </button>

                    <button id="sound-toggle" class="icon-btn" title="Toggle Sound">
                        <svg class="volume-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        <svg class="volume-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                    </button>
                    
                    <button id="leaderboard-btn" class="icon-btn" title="View Ranking">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="top-row">
            <div class="pb-display">
                personal best: <span id="pb-value">0</span> wpm
            </div>
        </div>

        <main id="game-view">
            <div id="stats" class="stats-container">
                <div class="stat">
                    <span class="stat-label">wpm</span>
                    <span id="wpm-val" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">acc</span>
                    <span id="acc-val" class="stat-value">100%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">time</span>
                    <span id="time-val" class="stat-value">0s</span>
                </div>
            </div>

            <div id="typing-box" class="test-box">
                <div id="words-container" class="words"></div>
                <input type="text" id="hidden-input" autocomplete="off" autofocus>
                <div id="focus-notice">Click here to focus</div>
            </div>

            <div id="keyboard" class="keyboard"></div>
        </main>

        <main id="result-view" style="display:none;">
            <div class="result-header">
                <div class="stat-large">
                    <span class="stat-label">wpm</span>
                    <span id="final-wpm" class="stat-value-large">0</span>
                </div>
                <div class="stat-large">
                    <span class="stat-label">accuracy</span>
                    <span id="final-acc" class="stat-value-large">0%</span>
                </div>
                <div id="new-record-tag" style="display:none;" class="new-record">New Record!</div>
            </div>
            
            <div class="chart-box">
                <svg id="wpm-chart" width="100%" height="200"></svg>
            </div>

            <div class="result-actions">
                <button id="restart-btn" class="primary-btn">Try Again</button>
            </div>
        </main>

        <div id="leaderboard-view" class="modal-overlay" style="display:none;">
            <div class="modal ranking-modal">
                <div class="modal-header">
                    <h3>local ranking</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <div id="ranking-list" class="ranking-list">
                    <!-- Ranked items will be injected here -->
                </div>
            </div>
        </div>

        <footer class="ui-frame">
            <div class="shortcuts">
                <kbd>shift</kbd> + <kbd>enter</kbd> - restart test
            </div>
            <div class="footer-links">
                <a href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg> github</a>
            </div>
        </footer>
    </div>

    <!-- Custom Text Modal -->
    <div id="custom-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Custom Paragraph</h3>
            <textarea id="custom-textarea" placeholder="Paste your text here..."></textarea>
            <div class="modal-actions">
                <button id="custom-start-btn" class="primary-btn">Start</button>
                <button id="custom-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
